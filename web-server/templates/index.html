<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capstone Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            background: white;
            padding: 32px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            width: 360px;
        }
        h1 {
            margin-top: 0;
            text-align: center;
            color: #222;
        }
        p {
            text-align: center;
            color: #666;
            margin-bottom: 24px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 14px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            border: none;
            background: #2563eb;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
        }
        button:hover {
            background: #1d4ed8;
        }
        .note {
            margin-top: 16px;
            font-size: 13px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>보안 로그인 시스템</h1>
        <p>캡스톤 웹 서버 로그인</p>

        <form action="/login" method="post">
            <input type="text" name="id" placeholder="아이디" required>
            <input type="password" name="pw" placeholder="비밀번호" required>
            <button type="submit">로그인</button>
        </form>

        <div class="note">
            로그인 시도는 모두 기록됩니다.
        </div>
    </div>
</body>
</html>
