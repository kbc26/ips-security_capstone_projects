<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f8fafc;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 900px;
            margin: 60px auto;
            background: white;
            padding: 32px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }
        h1 {
            margin-top: 0;
            color: #222;
        }
        .user {
            color: #2563eb;
            font-weight: bold;
        }
        .card-list {
            display: grid;
            gap: 16px;
            margin-top: 24px;
        }
        .card {
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 20px;
            background: #f9fafb;
        }
        .actions {
            margin-top: 24px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        a.button {
            display: inline-block;
            text-decoration: none;
            padding: 10px 16px;
            border-radius: 8px;
            background: #2563eb;
            color: white;
        }
        a.button.secondary {
            background: #6b7280;
        }
        a.button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>대시보드</h1>
        <p><span class="user">{{ username }}</span> 님, 로그인되었습니다.</p>

        <div class="card-list">
            <div class="card">
                <h3>시스템 상태</h3>
                <p>웹 서버 접근이 정상적으로 완료되었습니다.</p>
            </div>

            <div class="card">
                <h3>보안 기능</h3>
                <p>로그인 실패 횟수 추적, 계정 잠금, IP 기반 제한 기능이 동작 중입니다.</p>
            </div>

            <div class="card">
                <h3>관리자 메뉴</h3>
                <p>관리자 권한이 있는 계정만 /admin 페이지에 접근할 수 있습니다.</p>
            </div>
        </div>

        <div class="actions">
            <a class="button" href="/admin">관리자 페이지</a>
	    <a class="button" href="/logs">로그 보기</a>
            <a class="button secondary" href="/logout">로그아웃</a>
        </div>
    </div>
</body>
</html>
